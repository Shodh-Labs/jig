[workspace]
resolver = "2"
members = ["crates/jig-core", "crates/jig-cli", "crates/jig-mock-server"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/Shodh-Labs/jig"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = [
    "process",
    "io-util",
    "macros",
    "rt",
    "rt-multi-thread",
    "sync",
    "time",
] }
clap = { version = "4", features = ["derive"] }
