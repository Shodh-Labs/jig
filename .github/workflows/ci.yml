name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only reads the repo. No job here needs write access.
permissions:
  contents: read

# Cancel superseded runs on the same ref (a new push to a PR) but never
# collapse main's history.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Never let one OS mask another. Windows is where our users are — it must
      # get its own verdict on every run, not be short-circuited by a Linux fail.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Select stable toolchain
        run: rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo test
        run: cargo test --workspace --all-targets
      - name: cargo doctests
        run: cargo test --workspace --doc

  lint:
    name: lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Select stable toolchain
        run: rustup default stable
      - name: Add rustfmt + clippy
        run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  docs:
    name: docs (rustdoc)
    runs-on: ubuntu-latest
    env:
      # Broken intra-doc links and other rustdoc lints fail the build.
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - name: Select stable toolchain
        run: rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo doc
        run: cargo doc --workspace --no-deps

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Select stable toolchain
        run: rustup default stable
      - name: Add llvm-tools-preview
        run: rustup component add llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Collect coverage (lcov + summary)
        # Visibility first: no hard threshold gate. Produce an lcov artifact and
        # drop a human-readable summary onto the run's summary page.
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info
          {
            echo "## Coverage (cargo-llvm-cov)"
            echo ""
            echo '```'
            cargo llvm-cov report --summary-only
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload lcov artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info
          if-no-files-found: error

  dogfood:
    name: dogfood (self-demonstration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Select stable toolchain
        run: rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build jig + mock server
        run: cargo build --workspace
      - name: jig inspect (mock server)
        run: ./target/debug/jig inspect --stdio ./target/debug/jig-mock-server
      - name: jig budget -> job summary
        # The token-budget card lands on this run's summary page: the repo shows
        # its own product output on every commit.
        run: ./target/debug/jig budget --stdio ./target/debug/jig-mock-server --markdown >> "$GITHUB_STEP_SUMMARY"

  npm-install-smoke:
    name: npm install smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Each OS gets its own verdict: an install regression on one platform must
      # never be masked by another passing.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Select stable toolchain
        run: rustup default stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Build release binaries (jig + mock server)
        run: cargo build --release -p jig-cli -p jig-mock-server
      - name: End-to-end npm install smoke
        # Serve a REAL release archive from localhost, `npm pack` + install the
        # installer package against it (download -> checksum-verify -> extract),
        # then run the shim: `jig --version` and `jig inspect --stdio <mock>`.
        # This is what makes the macOS/Linux/Windows install claim TESTED.
        run: node .github/scripts/npm-install-smoke.js

  deny:
    name: cargo-deny (licenses + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Advisories are owned by the RustSec gate in audit.yml (cargo-audit), so
      # cargo-deny here enforces license policy + duplicate detection only and
      # never blocks a PR on an advisory. deny.toml documents the full policy.
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check bans licenses sources

  dco:
    name: DCO sign-off
    # Only meaningful for PRs — there is a base..head range to inspect.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every PR commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          for sha in $(git rev-list "$BASE_SHA..$HEAD_SHA"); do
            # Skip merge commits: they introduce no authored change to sign off.
            if [ "$(git show -s --format='%P' "$sha" | wc -w)" -gt 1 ]; then
              continue
            fi
            subject="$(git show -s --format='%s' "$sha")"
            if ! git show -s --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $sha ($subject) is missing a 'Signed-off-by' line"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo ""
            echo "Every commit must carry a DCO sign-off. Fix with:"
            echo "  git commit --amend --signoff        # last commit"
            echo "  git rebase --signoff origin/main     # a whole branch"
            exit 1
          fi
          echo "All PR commits carry a Signed-off-by line."
