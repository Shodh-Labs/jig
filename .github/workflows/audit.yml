name: Security Audit

# The RustSec advisory gate. Runs weekly (catch newly-disclosed advisories
# against an unchanged tree) and whenever the dependency set changes.

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays, 07:00 UTC
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    # audit-check opens a tracking issue for advisories on scheduled/push runs
    # and annotates the run as a check. GITHUB_TOKEN is the automatic per-run
    # token (no maintainer-supplied secret is involved).
    permissions:
      contents: read
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v7
      - name: cargo-audit (RustSec advisory-db)
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
