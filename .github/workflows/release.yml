name: Release

on:
  push:
    tags:
      - "v*"

# Only the final publish job needs write; the tag version is the source of truth.
permissions:
  contents: read

jobs:
  guard:
    name: Guard — tag == Cargo.toml version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - id: check
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          # Workspace version lives under [workspace.package] in the root manifest.
          crate="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$tag  cargo=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match workspace version $crate — refusing to release"
            exit 1
          fi
          echo "version=$tag" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.target }}
    needs: guard
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@v7
      - name: Select stable toolchain + target
        shell: bash
        run: |
          rustup default stable
          rustup target add "${{ matrix.target }}"
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}
      - name: Build release binary
        # Cargo.lock is intentionally untracked in this repo (see .gitignore), so
        # no --locked; the tag guard already pins the version.
        run: cargo build --release --locked -p jig-cli --target ${{ matrix.target }}
      - name: Package archive + checksum
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          set -euo pipefail
          ext=""
          [ "$ARCHIVE" = "zip" ] && ext=".exe"
          staging="jig-v${VERSION}-${TARGET}"
          mkdir "$staging"
          cp "target/${TARGET}/release/jig${ext}" "$staging/"
          cp LICENSE README.md "$staging/"
          if [ "$ARCHIVE" = "zip" ]; then
            7z a "${staging}.zip" "$staging" >/dev/null
            asset="${staging}.zip"
          else
            tar czf "${staging}.tar.gz" "$staging"
            asset="${staging}.tar.gz"
          fi
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > "${asset}.sha256"
          else
            shasum -a 256 "$asset" > "${asset}.sha256"
          fi
          echo "ASSET=$asset" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v7
        with:
          name: jig-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [guard, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload assets
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Combine per-target checksums into SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          cat ./*.sha256 > SHA256SUMS
          rm -f ./*.sha256
          echo "Release assets:"
          ls -la
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*

  # ---------------------------------------------------------------------------
  # crates.io publish — intentionally NOT enabled.
  #
  # TODO: the crate name(s) on crates.io are not yet claimed/resolved. Once the
  # names are secured, enable a publish job roughly like:
  #
  # publish-crates:
  #   name: Publish to crates.io
  #   needs: [guard, release]
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v7
  #     - run: rustup default stable
  #     - run: cargo publish -p jig-core --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
  #     - run: cargo publish -p jig-cli  --token "${{ secrets.CARGO_REGISTRY_TOKEN }}"
  # ---------------------------------------------------------------------------
