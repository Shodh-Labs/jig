name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Least privilege: only the deploy job needs to write Pages + mint an id-token.
permissions:
  contents: read

# One deployment at a time; never cancel a run that is mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Publish site/ to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/configure-pages@v5
      - name: Upload site/
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - id: deploy
        uses: actions/deploy-pages@v4
