version: 2
updates:
  # Rust dependencies.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One PR for the routine minor/patch churn; majors stay separate so they
      # get a real review.
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions (keep the pinned SHAs current).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
